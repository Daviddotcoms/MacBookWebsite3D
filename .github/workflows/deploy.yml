name: Test
on: [push]
jobs:
  Explore-Github-Actions:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - uses: actions/setup=node@v2
      - name: Install packages
        run: pnpm ci
      - name: Run ESlint
        run: pnpm run lint
      - name: Build
        run: pnpm run build
