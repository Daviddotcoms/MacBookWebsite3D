name: Deploy
on: [push]
jobs:
  Github-Actions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup=node@v6
      - name: Install packages
        run: pnpm ci
      - name: Run ESlint
        run: pnpm run lint
      - name: Build
        run: pnpm run build
